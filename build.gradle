plugins {
    id 'application'
}

repositories {
    mavenCentral()
}

dependencies {
    testImplementation 'org.junit.jupiter:junit-jupiter:5.8.1'
}

application {
    mainClass = 'org.example.Main'
}
tasks.register('prepareDocs', Copy) {
    from('src/main/resources/website')
    into("$rootDir/docs")
}